<div class="page" id="page-profile">
  <div class="page-header">
    <div class="page-header-left">
      <h2>My Profile</h2>
      <p>Manage your personal information and verification</p>
    </div>
    <button class="btn btn-outline" onclick="showToast('Profile saved successfully.')">Save Changes</button>
  </div>

  <div class="two-col" style="align-items:start">
    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-header"><span class="card-title">Personal Information</span></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" value="Juan">
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" value="Dela Cruz">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Middle Name</label>
              <input type="text" value="Santos">
            </div>
            <div class="form-group">
              <label>Date of Birth</label>
              <input type="date" value="1990-06-15">
            </div>
          </div>
          <div class="form-group">
            <label>Home Address</label>
            <input type="text" value="123 Sampaguita St., Brgy. San Roque, Quezon City">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Contact Number</label>
              <input type="text" value="09171234567">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" value="juan.delacruz@email.com">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Change Password</span></div>
        <div class="card-body">
          <div class="form-group">
            <label>Current Password</label>
            <input type="text" placeholder="Enter current password">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>New Password</label>
              <input type="text" placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="text" placeholder="Repeat new password">
            </div>
          </div>
          <button class="btn btn-outline" onclick="showToast('Password updated successfully.')">Update Password</button>
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-header"><span class="card-title">Account & Verification</span></div>
        <div class="card-body">
          <div style="text-align:center; margin-bottom:16px;">
            <div style="width:60px; height:60px; border-radius:50%; background:var(--blue-600); color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:600; margin:0 auto 10px;">JD</div>
            <div style="font-size:15px; font-weight:500; color:var(--gray-900)">Juan Dela Cruz</div>
            <div style="font-size:12px; color:var(--gray-400)">Member since January 2022</div>
          </div>
          <div class="detail-row" style="border-top:1px solid var(--gray-100); padding-top:10px">
            <span class="detail-key">Verification Status</span>
            <span class="chip chip-done">Verified</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">Resident ID</span>
            <span class="detail-val">BSR-2022-00234</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">Barangay</span>
            <span class="detail-val">San Roque, QC</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">Total Cases Filed</span>
            <span class="detail-val">3</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Notification Preferences</span></div>
        <div class="card-body">
          <div style="display:flex; flex-direction:column; gap:12px;">
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:0">
              <input type="checkbox" checked style="width:auto; cursor:pointer">
              <div>
                <div style="font-size:13px; color:var(--gray-900); font-weight:500">Mediation Reminders</div>
                <div style="font-size:11px;color:var(--gray-400)">48 and 24 hours before hearings</div>
              </div>
            </label>
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:0">
              <input type="checkbox" checked style="width:auto; cursor:pointer">
              <div>
                <div style="font-size:13px; color:var(--gray-900); font-weight:500">Case Status Updates</div>
                <div style="font-size:11px;color:var(--gray-400)">When your case status changes</div>
              </div>
            </label>
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:0">
              <input type="checkbox" style="width:auto; cursor:pointer">
              <div>
                <div style="font-size:13px; color:var(--gray-900); font-weight:500">Barangay Announcements</div>
                <div style="font-size:11px;color:var(--gray-400)">General community notices</div>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
